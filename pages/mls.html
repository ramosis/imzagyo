<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İmza GYO | MLS Portföy & Talep Havuzu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #c5a059; /* Gold */
            --secondary: #a78bfa; /* Purple */
            --bg: #0a192f;
            --card-bg: rgba(16, 33, 65, 0.8);
            --text: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 25px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 10px 25px;
            background: none;
            border: none;
            color: #94a3b8;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary);
            border-radius: 3px;
        }

        .mls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .mls-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .mls-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .card-img {
            height: 180px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .badge-circle {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-inner { background: rgba(167, 139, 250, 0.2); color: #a78bfa; border: 1px solid #a78bfa; }
        .badge-outer { background: rgba(197, 160, 89, 0.2); color: #c5a059; border: 1px solid #c5a059; }

        .card-body {
            padding: 20px;
        }

        .card-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .card-title {
            font-weight: bold;
            margin-bottom: 10px;
            height: 44px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .btn-collaborate {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-collaborate:hover {
            background: #d4b47a;
        }

        .demand-item {
            background: var(--card-bg);
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .match-badge {
            background: #22c55e;
            color: white;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 style="margin:0; font-family: 'Playfair Display', serif;">MLS Portföy & Talep Havuzu</h1>
                <p style="color: #94a3b8; margin: 5px 0 0 0;">Birlikte Kazanma ve İşbirliği Ağı</p>
            </div>
            <div style="display:flex; gap: 10px;">
                <button class="tab-btn active" onclick="switchMode('pool')"><i class="fas fa-layer-group"></i> Portföy Havuzu</button>
                <button class="tab-btn" onclick="switchMode('demands')"><i class="fas fa-users"></i> Talep Havuzu</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="countPool">0</div>
                <div style="font-size: 0.8rem; color: #94a3b8;">Aktif Portföy</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="countDemands" style="color: var(--secondary);">0</div>
                <div style="font-size: 0.8rem; color: #94a3b8;">Aktif Talep</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: #22c55e;" id="countMatches">0</div>
                <div style="font-size: 0.8rem; color: #94a3b8;">Akıllı Eşleşme</div>
            </div>
        </div>

        <div id="poolSection">
            <div class="mls-grid" id="poolGrid">
                <!-- JS ile doldurulacak -->
            </div>
        </div>

        <div id="demandSection" style="display:none;">
            <div id="demandList">
                <!-- JS ile doldurulacak -->
            </div>
        </div>
    </div>

    <script>
        let circleMode = 'inner'; // Varsayılan

        function loadData() {
            // Portföyleri Çek
            fetch(`/api/mls/listings?circle=${circleMode}`)
                .then(r => r.json())
                .then(data => {
                    renderPool(data);
                    document.getElementById('countPool').innerText = data.length;
                });

            // Eşleşmeleri Çek
            fetch('/api/mls/matches')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('countMatches').innerText = data.length;
                });
            
            // Talepleri Çek (Statik taslak şimdilik)
            const mockDemands = [
                { id: 1, region: 'Kadıköy', budget: '15M TL', category: 'Konut', status: 'matched' },
                { id: 2, region: 'Beşiktaş', budget: '25M TL', category: 'Villa', status: 'open' }
            ];
            renderDemands(mockDemands);
            document.getElementById('countDemands').innerText = mockDemands.length;
        }

        function renderPool(listings) {
            const grid = document.getElementById('poolGrid');
            grid.innerHTML = '';
            listings.forEach(item => {
                const card = document.createElement('div');
                card.className = 'mls-card';
                card.innerHTML = `
                    <div class="card-img">
                        <i class="fas fa-home fa-4x" style="color:rgba(255,255,255,0.2)"></i>
                        <span class="badge-circle badge-${item.sharing_status}">${item.sharing_status === 'inner' ? 'İç Daire' : 'Dış Daire'}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-price">${item.fiyat}</div>
                        <div class="card-title">${item.baslik}</div>
                        <div style="font-size: 0.85rem; color: #94a3b8;"><i class="fas fa-map-marker-alt"></i> ${item.lokasyon}</div>
                        <div class="card-meta">
                            <span>Komisyon: %${item.commission_split}</span>
                            <span>Apt: ${item.kategori}</span>
                        </div>
                        <button class="btn-collaborate" onclick="requestCollab('${item.id}')">İşbirliği Teklifi Gönder</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderDemands(demands) {
            const list = document.getElementById('demandList');
            list.innerHTML = '';
            demands.forEach(d => {
                const item = document.createElement('div');
                item.className = 'demand-item';
                item.innerHTML = `
                    <div>
                        <div style="font-weight:bold; font-size:1.1rem; color:var(--primary)">${d.region} - ${d.category}</div>
                        <div style="font-size:0.9rem; color:#94a3b8;">Bütçe: ${d.budget}</div>
                    </div>
                    <div style="text-align:right">
                        ${d.status === 'matched' ? '<span class="match-badge">Eşleşme Bulundu</span>' : '<span style="color:#94a3b8">Açık Talep</span>'}
                        <div style="margin-top:10px;"><button style="background:none; border:1px solid var(--secondary); color:var(--secondary); padding:5px 15px; border-radius:5px; cursor:pointer;">Portföy Öner</button></div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function switchMode(mode) {
            document.getElementById('poolSection').style.display = mode === 'pool' ? 'block' : 'none';
            document.getElementById('demandSection').style.display = mode === 'demands' ? 'block' : 'none';
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.includes(mode === 'pool' ? 'Portföy' : 'Talep'));
            });
        }

        function requestCollab(id) {
            alert('İşbirliği teklifi danışmana iletildi. MLS Sözleşmesi taslağı hazırlanıyor...');
        }

        loadData();
    </script>
</body>
</html>
