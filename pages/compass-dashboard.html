<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İmza PUSULA | Dijital Yaşam Hub'ı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: {
                            base: '#0f172a',
                            surface: '#1e293b',
                            accent: '#10b981', // emerald
                            glow: '#3b82f6', // electric blue
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .bg-mesh {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 25%);
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .glass-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.6));
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(59, 130, 246, 0.3); transform: translateY(-3px); }
        .timeline-line::before {
            content: ''; position: absolute; left: 15px; top: 10px; bottom: 10px;
            width: 2px; background: linear-gradient(to bottom, #10b981, rgba(59, 130, 246, 0.2));
            z-index: 0;
        }
        .glow-text { text-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="min-h-screen relative text-slate-200">
    <div class="bg-mesh"></div>

    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- Sidebar Navigation -->
        <nav class="w-full md:w-24 lg:w-64 glass-panel md:h-screen sticky top-0 flex md:flex-col items-center justify-between py-4 px-6 md:px-0 md:py-8 z-50">
            <div class="flex md:flex-col items-center gap-4 w-full">
                <!-- Logo -->
                <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-brand-glow to-brand-accent flex items-center justify-center shadow-lg shadow-brand-glow/20 mb-0 md:mb-8">
                    <i class="fas fa-compass text-white text-2xl"></i>
                </div>
                <!-- Nav Items Desktop -->
                <div class="hidden md:flex flex-col gap-6 w-full px-4">
                    <a href="#" class="flex items-center gap-4 text-brand-glow bg-brand-glow/10 p-3 rounded-xl transition font-medium">
                        <i class="fas fa-layer-group text-lg w-6 text-center"></i>
                        <span class="hidden lg:block truncate">Panelim</span>
                    </a>
                    <a href="#" class="flex items-center gap-4 text-slate-400 hover:text-white hover:bg-white/5 p-3 rounded-xl transition font-medium">
                        <i class="fas fa-file-contract text-lg w-6 text-center"></i>
                        <span class="hidden lg:block truncate">Belgeler Kapsülü</span>
                    </a>
                    <a href="#" class="flex items-center gap-4 text-slate-400 hover:text-white hover:bg-white/5 p-3 rounded-xl transition font-medium opacity-50 cursor-not-allowed" title="Çok Yakında">
                        <i class="fas fa-truck-moving text-lg w-6 text-center"></i>
                        <span class="hidden lg:block truncate">Taşınma Asistanı</span>
                    </a>
                </div>
            </div>
            
            <!-- Family Avatars (Beta) -->
            <div class="hidden md:flex flex-col items-center gap-4 mt-auto border-t border-white/10 pt-6 w-full">
                <p class="text-[10px] text-slate-500 uppercase tracking-widest hidden lg:block mb-2 font-bold">Aile Modülü</p>
                <div class="flex -space-x-3">
                    <img src="https://ui-avatars.com\/api/v1/?name=Ali&background=3b82f6&color=fff" class="w-10 h-10 rounded-full border-2 border-brand-base">
                    <img src="https://ui-avatars.com\/api/v1/?name=Ayşe&background=10b981&color=fff" class="w-10 h-10 rounded-full border-2 border-brand-base">
                </div>
                <button class="text-xs text-brand-glow hover:underline opacity-80 cursor-not-allowed hidden lg:block">Yakında Aktif</button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 p-6 md:p-10 lg:p-12 overflow-y-auto">
            <header class="flex justify-between items-end mb-12">
                <div>
                    <h1 class="text-3xl lg:text-5xl font-extrabold tracking-tight text-white mb-2 flex items-center gap-3">
                        İmza <span class="bg-gradient-to-r from-brand-glow to-brand-accent bg-clip-text text-transparent glow-text">PUSULA</span>
                    </h1>
                    <p class="text-slate-400 text-lg" id="welcome-msg">Hoş geldiniz, <span id="lead-name" class="font-semibold text-slate-200">Yükleniyor...</span></p>
                </div>
                <div class="hidden sm:flex text-right">
                    <div class="text-sm font-medium text-slate-400">Danışmanınız</div>
                    <div class="flex items-center gap-3 ml-4 bg-white/5 py-1.5 px-3 rounded-full border border-white/10">
                        <img src="https://ui-avatars.com\/api/v1/?name=Danisman&background=222&color=fff" class="w-8 h-8 rounded-full">
                        <a href="#" class="text-sm font-bold text-brand-glow hover:text-white transition"><i class="fab fa-whatsapp mr-1"></i> İletişime Geç</a>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                
                <!-- Left Column: Timeline -->
                <div class="xl:col-span-2 space-y-8">
                    <section class="glass-panel p-6 lg:p-8 rounded-[2rem]">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-xl font-bold flex items-center gap-3">
                                <span class="w-8 h-8 rounded-lg bg-brand-glow/20 flex items-center justify-center text-brand-glow"><i class="fas fa-route"></i></span>
                                İşlem Yol Haritası
                            </h2>
                            <span class="px-3 py-1 bg-white/5 rounded-full text-xs font-medium text-slate-400 border border-white/10" id="lead-status">Aktif</span>
                        </div>
                        
                        <div class="relative timeline-line pl-2" id="timeline-container">
                            <!-- Timeline items injected here -->
                            <div class="animate-pulse space-y-6">
                                <div class="flex gap-4"><div class="w-4 h-4 rounded-full bg-slate-700 mt-1"></div><div class="h-16 bg-slate-800/50 rounded-xl w-3/4"></div></div>
                                <div class="flex gap-4"><div class="w-4 h-4 rounded-full bg-slate-700 mt-1"></div><div class="h-16 bg-slate-800/50 rounded-xl w-1/2"></div></div>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- Right Column: Stats & Meta -->
                <div class="space-y-8">
                    <!-- Property Card -->
                    <section class="glass-panel p-1 rounded-[2rem] overflow-hidden hidden" id="property-card">
                        <div class="h-40 bg-slate-800 relative bg-cover bg-center rounded-t-[1.8rem]" id="prop-img">
                            <div class="absolute inset-0 bg-gradient-to-t from-brand-base to-transparent"></div>
                            <div class="absolute bottom-4 left-5 right-5">
                                <span class="text-xs font-bold px-2 py-1 bg-brand-accent text-white rounded text-shadow mb-2 inline-block shadow-lg shadow-brand-accent/30">Satışta</span>
                                <h3 class="text-lg font-bold truncate leading-tight mt-1 text-white text-shadow-md" id="prop-title">Mülk Başlığı</h3>
                            </div>
                        </div>
                        <div class="p-6">
                            <p class="text-sm text-slate-400 mb-1">Güncel Fiyat</p>
                            <p class="text-2xl font-bold text-white mb-6" id="prop-price">₺0</p>
                            <button class="w-full py-3 rounded-xl bg-white/5 hover:bg-white/10 text-sm font-medium transition border border-white/10">İlanı Önizle</button>
                        </div>
                    </section>

                    <!-- L-Metrics Stats Widget -->
                    <section class="glass-panel p-6 rounded-[2rem] relative overflow-hidden">
                        <!-- BG glow -->
                        <div class="absolute -top-10 -right-10 w-32 h-32 bg-brand-glow/20 blur-3xl rounded-full"></div>
                        
                        <h2 class="text-lg font-bold mb-6 flex items-center gap-3 relative z-10">
                            <i class="fas fa-chart-pie text-brand-glow"></i>
                            Pazarlama Etkileşimi
                        </h2>
                        
                        <div class="grid grid-cols-2 gap-4 relative z-10">
                            <div class="glass-card p-4 rounded-2xl flex flex-col justify-between">
                                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-2">Görüntülenme</p>
                                <p class="text-3xl font-light text-white" id="stat-views">0</p>
                            </div>
                            <div class="glass-card p-4 rounded-2xl flex flex-col justify-between">
                                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-2">Favoriye Alan</p>
                                <p class="text-3xl font-light text-white" id="stat-favs">0</p>
                            </div>
                            <div class="glass-card p-4 rounded-2xl col-span-2 flex justify-between items-center group">
                                <div>
                                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">L-Metrics Puanı <i class="fas fa-info-circle ml-1 opacity-50"></i></p>
                                    <div class="flex items-end gap-2">
                                        <p class="text-2xl font-bold text-brand-accent">85<span class="text-sm text-slate-500 font-normal">/100</span></p>
                                    </div>
                                </div>
                                <div class="w-12 h-12 rounded-full border-4 border-slate-800 border-t-brand-accent rotate-45 group-hover:rotate-[225deg] transition-all duration-700 ease-out"></div>
                            </div>
                        </div>
                    </section>
                </div>

            </div>
        </main>
    </div>

    <!-- Hidden Token Input -->
    <input type="hidden" id="app-token" value="{{ token }}">

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = document.getElementById('app-token').value;
            
            try {
                const response = await fetch('/api/v1/compass/data', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    document.body.innerHTML = '<div class="h-screen flex items-center justify-center text-center p-6"><div><h1 class="text-3xl font-bold text-white mb-4">Erişim Süresi Dolmuş</h1><p class="text-slate-400">Güvenliğiniz için bağlantı süresi dolmuştur. Lütfen danışmanınızdan yeni bir Pusula linki isteyin.</p></div></div>';
                    return;
                }

                const data = await response.json();
                
                // Populate UI
                document.getElementById('lead-name').innerText = data.lead_name;
                document.getElementById('stat-views').innerText = data.stats.views;
                document.getElementById('stat-favs').innerText = data.stats.favorites;
                
                if (data.status) {
                    document.getElementById('lead-status').innerText = data.status.toUpperCase();
                }

                // Property Card logic
                if (data.property) {
                    const pCard = document.getElementById('property-card');
                    pCard.classList.remove('hidden');
                    document.getElementById('prop-title').innerText = data.property.title;
                    document.getElementById('prop-price').innerText = `₺${Number(data.property.price).toLocaleString('tr-TR')}`;
                    if (data.property.resim_url) {
                        document.getElementById('prop-img').style.backgroundImage = `url('${data.property.resim_url}')`;
                    }
                }

                // Timeline logic
                const tContainer = document.getElementById('timeline-container');
                if (data.timeline && data.timeline.length > 0) {
                    tContainer.innerHTML = data.timeline.map((item, index) => {
                        const isFirst = index === 0;
                        const bgColor = isFirst ? 'bg-brand-accent' : 'bg-slate-700';
                        const dotClass = isFirst ? 'w-4 h-4 border-2 border-brand-base shadow-[0_0_10px_rgba(16,185,129,0.5)]' : 'w-3 h-3 ml-0.5 border-2 border-brand-base';
                        const cardBg = isFirst ? 'bg-gradient-to-r from-brand-accent/20 to-transparent border-brand-accent/30' : 'bg-white/5 border-white/5 hover:border-white/10';
                        
                        return `
                        <div class="relative pl-8 mb-6 group">
                            <!-- Dot -->
                            <div class="absolute left-[-5px] sm:left-[-7px] top-3 ${dotClass} rounded-full ${bgColor} z-10 transition-transform group-hover:scale-125"></div>
                            
                            <!-- Card -->
                            <div class="p-4 sm:p-5 rounded-2xl border ${cardBg} transition-all">
                                <div class="flex justify-between items-start gap-4 mb-2">
                                    <h3 class="font-bold text-white ${isFirst ? 'text-lg' : 'text-base'}">${item.title}</h3>
                                    <span class="text-[10px] font-medium text-slate-400 uppercase tracking-wider whitespace-nowrap bg-black/20 px-2 py-1 rounded-md">
                                        ${new Date(item.timestamp).toLocaleDateString('tr-TR', {day:'numeric', month:'short'})}
                                    </span>
                                </div>
                                <p class="text-sm text-slate-300 leading-relaxed">${item.description}</p>
                            </div>
                        </div>
                        `;
                    }).join('');
                } else {
                    tContainer.innerHTML = '<p class="text-slate-500 pl-4 py-4 italic">Sonuç bulunamadı.</p>';
                }

            } catch (err) {
                console.error(err);
                document.getElementById('welcome-msg').innerText = 'Sistem bağlantısı kurulamadı.';
            }
        });
    </script>
</body>
</html>
