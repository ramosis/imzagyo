<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobil Uygulama | İmza Gayrimenkul</title>
    <style>
        :root {
            --gold: #D4AF37;
            --bg-dark: #0F0F13;
            --bg-card: #1A1A22;
            --text-muted: #9CA3AF;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .lux-container {
            max-width: 600px;
            width: 90%;
            text-align: center;
            animation: fadeIn 1.1s ease-out;
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: var(--gold);
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .download-card {
            background: var(--bg-card);
            border: 1px solid rgba(212, 175, 55, 0.1);
            padding: 40px;
            border-radius: 24px;
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        .download-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .btn-download {
            background: var(--gold);
            color: var(--bg-dark);
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
        }

        .btn-download:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3);
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
            text-align: left;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .feature-svg {
            color: var(--gold);
            min-width: 18px;
        }

        .qr-section {
            margin-top: 50px;
            opacity: 0.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .features { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="lux-container">
        <div class="logo-circle">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </div>
        
        <h1>İMZA MOBİL</h1>
        <p class="subtitle">PERSONEL & YÖNETİCİ OPERASYON MERKEZİ</p>

        <div class="download-card">
            <p style="margin-bottom: 25px; color: var(--text-muted);">Android cihazlar için güncel v1.0.0 sürümünü indirin.</p>
            <a href="/static/downloads/imza-gayrimenkul.apk" class="btn-download">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                ANDROİD APK İNDİR
            </a>
            
            <div class="features">
                <div class="feature-item">
                    <svg class="feature-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                    CRM & Lead Yönetimi
                </div>
                <div class="feature-item">
                    <svg class="feature-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                    Randevu Takvimi
                </div>
                <div class="feature-item">
                    <svg class="feature-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                    Saha Ekip Takibi
                </div>
                <div class="feature-item">
                    <svg class="feature-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                    Anlık Konum Paylaşımı
                </div>
            </div>
        </div>

        <p style="font-size: 0.8rem; color: var(--text-muted);">iOS sürümü yakında App Store'da!</p>
        
        <div class="qr-section">
            <p style="font-size: 0.7rem; letter-spacing: 1px;">MOBİL.IMZAEMLAK.COM</p>
        </div>
    </div>
</body>
</html>
