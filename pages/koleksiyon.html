<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İmza Koleksiyonları | İmza Gayrimenkul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0a192f',
                        gold: '#c5a059',
                        soft: '#f8fafc',
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a192f;
            color: white;
            overflow-x: hidden;
        }

        .brand-pattern {
            background-image: radial-gradient(#c5a059 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.1;
        }

        /* Header Slide Down Animasyonu */
        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-animate {
            animation: slideDown 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-up {
            opacity: 0;
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Lux Curtain (Lüks Perde) Köprüsü */
        .lux-curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a192f;
            z-index: 99999;
            pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lux-curtain.hidden {
            opacity: 0;
        }
    </style>
    <script>
        // Koleksiyon Verileri
        const collectionData = {
            prestij: {
                title: "PRESTİJ KOLEKSİYONU",
                subtitle: "Zirvedeki Lüks",
                description: "Yalı, köşk ve ultra lüks konut segmentinde sınırları aşan, rakipsiz bir yaşam deneyimi. Sınırlı sayıdaki en nadide gayrimenkuller prestijin ta kendisi olan bu seride buluşuyor.",
                bgImage: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=2000&q=80",
                icon: "fa-crown",
                director: {
                    name: "Hakan Yılmaz",
                    title: "Prestij Direktörü",
                    img: "https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=400&q=80"
                }
            },
            modern: {
                title: "MODERN KOLEKSİYON",
                subtitle: "Şehrin Yeni Ritmi",
                description: "Şehrin kalbinde, inovatif mimari ve akıllı ev sistemleriyle donatılmış rezidans ve penthouse daireler. Geleceğin yaşam tarzını bugünden inşa edenler için tasarlandı.",
                bgImage: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=2000&q=80",
                icon: "fa-city",
                director: {
                    name: "Ayşe Tekin",
                    title: "Modern Koleksiyon Direktörü",
                    img: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=400&q=80"
                }
            },
            doga: {
                title: "DOĞA KOLEKSİYONU",
                subtitle: "Organik Huzur",
                description: "Şehrin gürültüsünden uzak, doğayla iç içe lüks ekolojik villalar, çiftlik evleri ve kırsal yaşam alanları. Doğanın ritmini lüksün konforuyla harmanlayan özel dünyanız.",
                bgImage: "https://images.unsplash.com/photo-1518780664697-55e3ad937233?auto=format&fit=crop&w=2000&q=80",
                icon: "fa-leaf",
                director: {
                    name: "Burak Kaya",
                    title: "Doğa Koleksiyonu Direktörü",
                    img: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&w=400&q=80"
                }
            }
        };

        // Mevcut Koleksiyonu Al
        function getCurrentCollection() {
            const urlParams = new URLSearchParams(window.location.search);
            const typeParam = urlParams.get('tip');
            if (typeParam && collectionData[typeParam]) {
                return { key: typeParam, data: collectionData[typeParam] };
            }
            // Varsayılan: Prestij
            return { key: 'prestij', data: collectionData['prestij'] };
        }

        // Lux Curtain Bridge Logic
        function luxNavigate(url) {
            const curtain = document.querySelector('.lux-curtain');
            curtain.style.transition = 'opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
            curtain.classList.remove('hidden');
            setTimeout(() => {
                window.location.href = url;
            }, 450);
        }

        document.addEventListener('DOMContentLoaded', () => {
            // İçeriği Doldur
            const current = getCurrentCollection();
            const data = current.data;

            document.title = `${data.title} | İmza Gayrimenkul`;
            document.getElementById('bg-image').style.backgroundImage = `url('${data.bgImage}')`;
            document.getElementById('col-icon').className = `fas ${data.icon} text-gold text-4xl mb-6 shadow-2xl`;
            document.getElementById('col-subtitle').textContent = data.subtitle;
            document.getElementById('col-title').innerHTML = data.title.split(' ')[0] + '<br><span class="text-gold italic">' + (data.title.split(' ')[1] || '') + '</span>';
            document.getElementById('col-desc').textContent = data.description;

            document.getElementById('dir-img').src = data.director.img;
            document.getElementById('dir-title').textContent = data.director.title;
            document.getElementById('dir-name').textContent = data.director.name;

            // Arka Plan Karartmasını Ayarla
            document.getElementById('read-more-btn').onclick = () => {
                luxNavigate(`arama.html?koleksiyon=${current.key}`);
            };

            // Açılış (Intro) - Lüks ve Ağır
            const curtain = document.querySelector('.lux-curtain');
            curtain.style.transition = 'opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1)';
            setTimeout(() => {
                curtain.classList.add('hidden');
            }, 100);

            // Geri butonu için düzeltme (Bfcache)
            window.addEventListener('pageshow', (event) => {
                if (event.persisted) {
                    const curtain = document.querySelector('.lux-curtain');
                    curtain.classList.add('hidden');
                }
            });

            // Link Yakalayıcı
            document.addEventListener('click', (e) => {
                const link = e.target.closest('a');
                if (link && link.href && link.href.includes('.html') && !link.target && !e.ctrlKey && !e.shiftKey) {
                    const targetUrl = link.href;
                    const isInternal = targetUrl.includes(window.location.origin) || !targetUrl.startsWith('http');

                    if (isInternal && !targetUrl.includes('#')) {
                        e.preventDefault();
                        luxNavigate(targetUrl);
                    }
                }
            });
        });
    </script>
</head>

<body class="antialiased selection:bg-gold selection:text-navy">

    <!-- Lux Curtain -->
    <div class="lux-curtain">
        <div class="w-24 h-24 border-t-2 border-r-2 border-gold rounded-full animate-spin"></div>
    </div>

    <!-- Header / Navigasyon -->
    <header class="fixed w-full z-50 transition-all duration-500 bg-transparent header-animate">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 md:py-6">
            <div class="flex justify-between items-center">
                <a href="anasayfa.html" class="flex items-center group">
                    <span class="text-2xl font-serif font-bold text-white tracking-widest relative drop-shadow-lg">
                        İMZA
                        <span
                            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-gold transition-all duration-500 group-hover:w-full"></span>
                    </span>
                    <span
                        class="text-gold font-light ml-2 tracking-widest text-sm mt-1 drop-shadow-md">GAYRİMENKUL</span>
                </a>

                <div class="flex items-center space-x-10">
                    <a href="anasayfa.html"
                        class="text-sm font-medium text-white hover:text-gold transition-colors tracking-widest drop-shadow-md">Ana
                        Sayfa</a>
                    <a href="#" class="cursor-pointer" onclick="javascript:history.back()">
                        <i class="fa-solid fa-xmark text-white hover:text-gold text-2xl transition-all"></i>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <div class="main-wrapper" id="mainWrapper">
        <!-- Tam Ekran Hero Section -->
        <section class="relative h-screen bg-navy overflow-hidden flex items-center">

            <!-- Dinamik Arka Plan Görseli -->
            <div id="bg-image"
                class="absolute inset-0 bg-cover bg-center bg-no-repeat bg-fixed transition-all duration-1000 transform scale-105"
                style="background-image: url('');"></div>

            <!-- Karartma Katmanı -->
            <div class="absolute inset-0 bg-gradient-to-r from-navy via-navy/80 to-navy/10"></div>
            <div class="absolute inset-0 brand-pattern opacity-10"></div>

            <div
                class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 w-full flex flex-col md:flex-row items-center justify-between">

                <!-- Sol Taraf: Düzyazı ve Bilgi -->
                <div class="max-w-2xl text-left animate-up" style="animation-delay: 0.3s;">
                    <i id="col-icon" class="fas fa-crown text-gold text-4xl mb-6 shadow-2xl"></i>
                    <p id="col-subtitle"
                        class="text-gold uppercase tracking-[0.4em] text-xs font-bold mb-4 drop-shadow-md border-l-2 border-gold pl-4 italic">
                        Zirvedeki Lüks</p>
                    <h1 id="col-title"
                        class="text-5xl md:text-7xl font-serif font-bold text-white mb-8 tracking-tighter uppercase drop-shadow-2xl">
                        PRESTİJ <br><span class="text-gold italic">KOLEKSİYONU</span>
                    </h1>
                    <p id="col-desc" class="text-lg text-gray-300 font-light leading-relaxed mb-10 max-w-xl">
                        Yalı, köşk ve ultra lüks konut segmentinde sınırları aşan, rakipsiz bir yaşam deneyimi. Sınırlı
                        sayıdaki en nadide gayrimenkuller prestijin ta kendisi olan bu seride buluşuyor.
                    </p>
                    <button id="read-more-btn"
                        class="bg-gold hover:bg-yellow-600 text-navy px-12 py-5 rounded-full font-bold transition-all text-sm uppercase tracking-widest shadow-xl shadow-gold/20 flex items-center gap-3">
                        Portföyleri İncele <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <!-- Sağ Taraf: Küratör Bilgisi -->
                <div class="hidden md:flex flex-col items-center animate-up" style="animation-delay: 0.6s;">
                    <div
                        class="relative w-48 h-64 rounded-full overflow-hidden shadow-2xl border-4 border-gold/30 mb-6 bg-navy">
                        <img id="dir-img" src="" alt="Director"
                            class="w-full h-full object-cover grayscale opacity-80 hover:grayscale-0 hover:opacity-100 transition-all duration-700">
                    </div>
                    <div class="text-center">
                        <p id="dir-title" class="text-gold font-serif italic text-sm mb-1 px-4">Küratör & Direktör</p>
                        <h3 id="dir-name" class="text-xl font-bold text-white uppercase tracking-wider">Hakan <br>Yılmaz
                        </h3>
                    </div>
                </div>

            </div>

            <!-- Scroll Indicator -->
            <div
                class="absolute bottom-10 left-1/2 transform -translate-x-1/2 flex flex-col items-center gap-2 animate-bounce opacity-50">
                <span class="text-[9px] text-white uppercase tracking-[0.3em] font-bold">Keşfet</span>
                <div class="w-px h-12 bg-gradient-to-b from-gold to-transparent"></div>
            </div>
        </section>

    </div>
</body>

</html>
