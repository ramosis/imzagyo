<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline | Satış Hunisi Kanban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .kanban-column { min-height: 70vh; transition: background 0.3s; }
        .kanban-card { cursor: grab; transition: all 0.2s ease; border-left: 4px solid #3b82f6; }
        .kanban-card:active { cursor: grabbing; transform: scale(0.98); }
        .ghost-card { opacity: 0.4; background: #334155 !important; }
        .column-header { background: linear-gradient(90deg, #1e293b, #0f172a); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Satış Hunisi</h1>
                <p class="text-slate-400 text-sm mt-1">Adaylarınızı sürükleyip bırakarak süreci yönetin.</p>
            </div>
            <button onclick="window.location.href='/portal'" class="px-6 py-2 glass rounded-xl text-sm font-medium hover:bg-white/10 transition-colors">Portala Dön</button>
        </header>

        <!-- Kanban Board -->
        <div id="kanban-board" class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- New Lead -->
            <div class="flex flex-col h-full">
                <div class="column-header p-4 rounded-t-2xl border-b border-white/5 flex justify-between items-center">
                    <span class="font-semibold text-blue-400 flex items-center gap-2">
                        <i class="fas fa-plus-circle"></i> Yeni Aday
                    </span>
                    <span id="count-new" class="text-xs bg-slate-800 px-2 py-1 rounded-full">0</span>
                </div>
                <div id="col-new" data-status="New" class="kanban-column p-3 glass rounded-b-2xl space-y-3"></div>
            </div>

            <!-- Contacted -->
            <div class="flex flex-col h-full">
                <div class="column-header p-4 rounded-t-2xl border-b border-white/5 flex justify-between items-center">
                    <span class="font-semibold text-amber-400 flex items-center gap-2">
                        <i class="fas fa-phone"></i> İletişim Kuruldu
                    </span>
                    <span id="count-contacted" class="text-xs bg-slate-800 px-2 py-1 rounded-full">0</span>
                </div>
                <div id="col-contacted" data-status="Contacted" class="kanban-column p-3 glass rounded-b-2xl space-y-3"></div>
            </div>

            <!-- Proposal -->
            <div class="flex flex-col h-full">
                <div class="column-header p-4 rounded-t-2xl border-b border-white/5 flex justify-between items-center">
                    <span class="font-semibold text-indigo-400 flex items-center gap-2">
                        <i class="fas fa-file-invoice-dollar"></i> Teklif Verildi
                    </span>
                    <span id="count-proposal" class="text-xs bg-slate-800 px-2 py-1 rounded-full">0</span>
                </div>
                <div id="col-proposal" data-status="Proposal" class="kanban-column p-3 glass rounded-b-2xl space-y-3"></div>
            </div>

            <!-- Closed -->
            <div class="flex flex-col h-full">
                <div class="column-header p-4 rounded-t-2xl border-b border-white/5 flex justify-between items-center">
                    <span class="font-semibold text-emerald-400 flex items-center gap-2">
                        <i class="fas fa-check-double"></i> Satış Kapandı
                    </span>
                    <span id="count-closed" class="text-xs bg-slate-800 px-2 py-1 rounded-full">0</span>
                </div>
                <div id="col-closed" data-status="Closed" class="kanban-column p-3 glass rounded-b-2xl space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        async function fetchLeads() {
            try {
                const response = await fetch('/api/pipeline/leads');
                const leads = await response.json();
                renderLeads(leads);
            } catch (error) {
                console.error('Error fetching leads:', error);
            }
        }

        function renderLeads(leads) {
            const columns = {
                'New': document.getElementById('col-new'),
                'Contacted': document.getElementById('col-contacted'),
                'Proposal': document.getElementById('col-proposal'),
                'Closed': document.getElementById('col-closed')
            };

            // Clear columns
            Object.values(columns).forEach(col => col.innerHTML = '');

            leads.forEach(lead => {
                const card = document.createElement('div');
                card.className = 'kanban-card p-4 bg-slate-800/50 rounded-xl hover:bg-slate-700/50 hover:shadow-lg transition-all border border-white/5';
                card.setAttribute('data-id', lead.id);
                
                // Content
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-medium text-slate-100">${lead.name}</h4>
                        <span class="text-[10px] text-slate-500 uppercase font-bold">${lead.source || 'Direct'}</span>
                    </div>
                    <div class="text-xs text-slate-400 space-y-1">
                        <p><i class="fas fa-envelope mr-1 opacity-50"></i> ${lead.email}</p>
                        <p><i class="fas fa-map-marker-alt mr-1 opacity-50"></i> ${lead.property_interest || 'General'}</p>
                    </div>
                    <div class="mt-4 flex justify-between items-center">
                        <div class="flex -space-x-2">
                            <div class="w-6 h-6 rounded-full bg-blue-500 border-2 border-slate-800 flex items-center justify-center text-[8px] font-bold">SY</div>
                        </div>
                        <span class="text-[10px] bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded-full">Bugün</span>
                    </div>
                `;
                
                const col = columns[lead.status] || columns['New'];
                col.appendChild(card);
            });

            updateCounts();
        }

        function updateCounts() {
            document.getElementById('count-new').innerText = document.getElementById('col-new').children.length;
            document.getElementById('count-contacted').innerText = document.getElementById('col-contacted').children.length;
            document.getElementById('count-proposal').innerText = document.getElementById('col-proposal').children.length;
            document.getElementById('count-closed').innerText = document.getElementById('col-closed').children.length;
        }

        async function updateLeadStatus(leadId, newStatus) {
            try {
                const response = await fetch(`/api/pipeline/leads/${leadId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (!response.ok) throw new Error('Status update failed');
                console.log(`Lead ${leadId} updated to ${newStatus}`);
            } catch (error) {
                console.error('Error updating lead status:', error);
                alert('Durum güncellenemedi, lütfen sayfayı yenileyin.');
            }
        }

        // Initialize SortableJS for each column
        document.querySelectorAll('.kanban-column').forEach(el => {
            new Sortable(el, {
                group: 'leads',
                animation: 250,
                ghostClass: 'ghost-card',
                onEnd: async function (evt) {
                    const leadId = evt.item.getAttribute('data-id');
                    const newStatus = evt.to.getAttribute('data-status');
                    await updateLeadStatus(leadId, newStatus);
                    updateCounts();
                }
            });
        });

        // Initial Load
        fetchLeads();
    </script>
</body>
</html>
