server {
    listen 80;
    server_name imzamahalle.com www.imzamahalle.com;
    
    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # SSL redirect
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name imzamahalle.com www.imzamahalle.com;
    
    ssl_certificate /etc/letsencrypt/live/imzamahalle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imzamahalle.com/privkey.pem;
    
    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
