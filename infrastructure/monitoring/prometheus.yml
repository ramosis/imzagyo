global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: 'imza'

storage:
  tsdb:
    retention.time: 7d
    retention.size: 5GB

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9094'] # Simple alert webhook handler

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'imza-app'
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s
