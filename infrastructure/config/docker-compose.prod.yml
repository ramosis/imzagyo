version: '3.8'

services:
  app:
    build: 
      context: ../../
      dockerfile: infrastructure/config/Dockerfile
    container_name: imza_app
    restart: always
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql://imza:password@db:5432/imza
      - FLASK_ENV=production
    depends_on:
      - db
    networks:
      - imza_network

  db:
    image: postgres:15-alpine
    container_name: imza_db
    restart: always
    environment:
      POSTGRES_USER: imza
      POSTGRES_PASSWORD: password
      POSTGRES_DB: imza
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - imza_network
  
  nginx:
    image: nginx:alpine
    container_name: imza_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/conf.d:/etc/nginx/conf.d
      - ../nginx/ssl:/etc/nginx/ssl
      - ../../frontend/static:/var/www/static
    depends_on:
      - app
    networks:
      - imza_network

networks:
  imza_network:
    driver: bridge

volumes:
  postgres_data:
