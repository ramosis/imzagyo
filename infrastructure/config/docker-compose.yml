version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: infrastructure/config/Dockerfile
    container_name: imza_app_dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://imza:imza_password@db:5432/imza_dev
      - FLASK_ENV=development
    volumes:
      - ../../:/app
      - /app/data  # Keep SQLite for reference
    depends_on:
      - db
    env_file:
      - ../../.env

  db:
    image: postgres:15-alpine
    container_name: imza_db_dev
    environment:
      POSTGRES_USER: imza
      POSTGRES_PASSWORD: imza_password
      POSTGRES_DB: imza_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: imza_redis_dev
    ports:
      - "6379:6379"

volumes:
  postgres_data:
