# ==============================================================
# Multi-Domain Nginx Configuration for İmza Group
# ==============================================================

# 1. IMZA EMLAK (VIP / Investment Portal)
server {
    listen 80;
    server_name imzaemlak.com www.imzaemlak.com imzagayrimenkul.com www.imzagayrimenkul.com;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name imzaemlak.com www.imzaemlak.com imzagayrimenkul.com www.imzagayrimenkul.com;

    ssl_certificate     /etc/letsencrypt/live/imzaemlak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imzaemlak.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /opt/imzagayrimenkul/uploads/;
        expires 30d;
    }
}

