# ==============================================================
# Multi-Domain Nginx Configuration for İmza Group
# ==============================================================

# Common SSL & Security Settings (Snippet)
# (In a real setup, these would be in a separate includes file)

# 1. IMZA EMLAK (VIP / Investment Portal)
server {
    listen 80;
    server_name imzaemlak.com www.imzaemlak.com imzagayrimenkul.com www.imzagayrimenkul.com;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name imzaemlak.com www.imzaemlak.com imzagayrimenkul.com www.imzagayrimenkul.com;

    ssl_certificate     /etc/letsencrypt/live/imzaemlak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imzaemlak.com/privkey.pem;

    # SSL specific optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    
    client_max_body_size 20M;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Statik dosyalar için önbellekleme
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /uploads/ {
        alias /imzagyo/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

# 2. IMZA MAHALLE (Neighborhood Portal)
server {
    listen 80;
    server_name imzamahalle.com www.imzamahalle.com;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name imzamahalle.com www.imzamahalle.com;

    ssl_certificate     /etc/letsencrypt/live/imzamahalle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imzamahalle.com/privkey.pem;

    client_max_body_size 20M;

    location / {
        # Mahalle app might be a different port or the same backend with host detection
        proxy_pass http://127.0.0.1:8000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
