<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evrensel ROI Asistanı</title>
    <style>
        :root {
            --navy: #0f172a;
            --gold: #f59e0b;
            --green: #10b981;
            --bg: #1e293b;
        }
        body {
            width: 320px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--navy);
            color: white;
            margin: 0;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
        }
        .card {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .label { font-size: 11px; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; }
        .value { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
        
        input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-add { background: var(--gold); color: var(--navy); }
        .btn-panel { background: #334155; color: white; margin-top: 20px; }
        .roi-badge {
            display: inline-block;
            padding: 4px 8px;
            background: var(--green);
            color: white;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-size: 20px;">🥂</span>
        <div style="font-weight: 800; font-size: 14px;">ROI ASİSTANI (MVP)</div>
    </div>

    <div id="dataCard" class="card">
        <div class="label">İlan Başlığı</div>
        <input type="text" id="listingTitle" style="font-size: 12px; margin-bottom: 12px;" value="Yükleniyor...">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
            <div>
                <div class="label">Fiyat</div>
                <input type="text" id="listingPrice" value="Bilinmiyor">
            </div>
            <div>
                <div class="label">Oda</div>
                <input type="text" id="listingRooms" value="0+0">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
            <div>
                <div class="label">Brüt m2</div>
                <input type="number" id="listingM2Brut" value="0">
            </div>
            <div>
                <div class="label">Net m2</div>
                <input type="number" id="listingM2Net" value="0">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
            <div>
                <div class="label">İlan Tipi</div>
                <select id="listingType">
                    <option value="Satılık">Satılık</option>
                    <option value="Kiralık">Kiralık</option>
                </select>
            </div>
            <div>
                <div class="label">Kategori</div>
                <select id="listingCategory">
                    <option value="Daire">Daire</option>
                    <option value="Rezidans">Rezidans</option>
                    <option value="Villa">Villa</option>
                    <option value="Arsa">Arsa</option>
                    <option value="Tarla">Tarla</option>
                    <option value="İşyeri">İşyeri</option>
                    <option value="Prefabrik">Prefabrik</option>
                </select>
            </div>
        </div>

        <div class="label">Tahmini Aylık Kira (₺)</div>
        <input type="number" id="rentInput" placeholder="Örn: 25000">
        
        <div id="resultArea" style="display: none; margin-top: 15px; border-top: 1px dashed #334155; padding-top: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="label">ROI Score:</span>
                <span id="roiValue" class="roi-badge">0%</span>
            </div>
            <div style="font-size: 12px; color: #94a3b8; margin-top: 4px;">
                Amortisman: <span id="amortizationYears" style="color: white; font-weight: bold;">0</span> Yıl
            </div>
        </div>
    </div>

    <button id="addToListBtn" class="btn-add">🌟 Karşılaştırma Listeme Ekle</button>
    <button id="openDashboardBtn" class="btn-panel">Karşılaştırma Panelini Aç 🖥️</button>

    <script src="popup.js"></script>
</body>
</html>
