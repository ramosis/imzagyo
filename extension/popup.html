<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROI Asistanı</title>
    <style>
        :root {
            --navy: #0f172a;
            --gold: #f59e0b;
            --green: #10b981;
            --bg: #1e293b;
        }
        body {
            width: 320px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--navy);
            color: white;
            margin: 0;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
        }
        .card {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .label { font-size: 11px; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; margin-bottom: 4px; }
        .value { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
        
        input[type="text"], input[type="number"], input[type="checkbox"], select {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 8px;
            box-sizing: border-box;
        }
        input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
        }
        .checkbox-group { display: flex; align-items: center; }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-add { background: var(--gold); color: var(--navy); }
        .btn-panel { background: #334155; color: white; margin-top: 20px; }
        .roi-badge {
            display: inline-block;
            padding: 4px 8px;
            background: var(--green);
            color: white;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 4px;
        }
        .button-group {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }
        .option-button {
            flex: 1;
            padding: 8px;
            font-size: 11px;
            margin-top: 0;
            background: #334155;
            color: #e2e8f0;
            border: 1px solid #475569;
        }
        .option-button.active {
            background: var(--gold);
            color: var(--navy);
            border-color: var(--gold);
            font-weight: 800;
        }
        .hidden {
            display: none !important;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        #langSelect {
            width: auto;
            padding: 4px;
            font-size: 12px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 8px;">
            <span style="font-size: 20px;">🥂</span>
            <div id="msg-roiAssistant" style="font-weight: 800; font-size: 14px;">ROI ASİSTANI</div>
        </div>
        <select id="langSelect">
            <option value="tr">TR</option>
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="de">DE</option>
            <option value="ru">RU</option>
            <option value="ar">AR</option>
        </select>
    </div>

    <div id="dataCard" class="card">
        <div class="label" id="msg-listingType">İlan Tipi</div>
        <div id="ilan-tipi-group" class="button-group">
            <button class="option-button" data-value="Konut" id="msg-residential">Konut</button>
            <button class="option-button" data-value="Dükkan" id="msg-commercial">Dükkan</button>
            <button class="option-button" data-value="Arsa" id="msg-land">Arsa</button>
            <button class="option-button" data-value="Tarla" id="msg-field">Tarla</button>
        </div>

        <div class="label" id="msg-operationType">İşlem Tipi</div>
        <div id="islem-tipi-group" class="button-group">
            <button class="option-button" data-value="Satılık" id="msg-forSale">Satılık</button>
            <button class="option-button" data-value="Kiralık" id="msg-forRent">Kiralık</button>
        </div>

        <div class="label" id="msg-listingTitle">İlan Başlığı</div>
        <input type="text" id="listingTitle" style="font-size: 12px; margin-bottom: 12px;">
        
        <div class="form-grid">
            <div>
                <div class="label" id="msg-price">Fiyat</div>
                <input type="text" id="listingPrice" value="0">
            </div>
            <div>
                <div class="label" id="msg-rooms">Oda</div>
                <input type="text" id="listingRooms" value="0+0">
            </div>
        </div>

        <div id="m2-fields" class="form-grid">
            <div>
                <div class="label" id="msg-brutM2">Brüt m2</div>
                <input type="number" id="listingM2Brut" value="0">
            </div>
            <div>
                <div class="label" id="msg-netM2">Net m2</div>
                <input type="number" id="listingM2Net" value="0">
            </div>
        </div>
        
        <div id="arsa-fields" class="form-grid hidden">
            <div>
                <div class="label" id="msg-emsal">Emsal Oranı</div>
                <input type="text" id="listingEmsal" placeholder="0.95">
            </div>
            <div>
                <div class="label" id="msg-katSayisi">Kat Sayısı</div>
                <input type="number" id="listingKatSayisi" placeholder="4">
            </div>
        </div>

        <div id="tarla-fields" class="form-grid hidden">
            <div class="checkbox-group">
                <input type="checkbox" id="checkImaraYakin">
                <label for="checkImaraYakin" class="label" style="margin-bottom: 0;" id="msg-imaraYakin">İmara Yakın</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="checkGeseUygun">
                <label for="checkGeseUygun" class="label" style="margin-bottom: 0;" id="msg-geseUygun">GES'e Uygun</label>
            </div>
        </div>


        <div class="label" id="msg-monthlyRent">Tahmini Aylık Kira (₺)</div>
        <input type="number" id="rentInput" placeholder="25000">
        
        <div id="resultArea" style="display: none; margin-top: 15px; border-top: 1px dashed #334155; padding-top: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="label" id="msg-roiScore">ROI Score:</span>
                <span id="roiValue" class="roi-badge">0%</span>
            </div>
            <div style="font-size: 12px; color: #94a3b8; margin-top: 4px;">
                <span id="msg-amortization">Amortisman</span>: <span id="amortizationYears" style="color: white; font-weight: bold;">0</span> <span id="msg-years">Yıl</span>
            </div>
        </div>
    </div>

    <button id="addToListBtn" class="btn-add">🌟 Karşılaştırma Listeme Ekle</button>
    <button id="openDashboardBtn" class="btn-panel">Karşılaştırma Panelini Aç 🖥️</button>

    <script src="popup.js"></script>
    <div style="text-align: center; margin-top: 12px; padding-bottom: 8px;">
        <a href="https://imzaemlak.com/legal" target="_blank" style="color: #64748b; font-size: 10px; text-decoration: none;">Gizlilik Politikası & Kullanım Koşulları</a>
    </div>
</body>
</html>
