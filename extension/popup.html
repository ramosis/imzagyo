<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --gold: #D4AF37;
            --bg: #0F0F13;
            --card: #1A1A22;
        }
        body {
            width: 320px;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .logo {
            width: 24px;
            height: 24px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--gold);
        }
        h2 {
            margin: 0;
            font-size: 16px;
            letter-spacing: 1px;
        }
        .status-card {
            background: var(--card);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .status-label {
            font-size: 10px;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-value {
            font-size: 14px;
            margin-top: 5px;
            color: var(--gold);
            font-weight: 600;
        }
        .btn {
            background: var(--gold);
            color: var(--bg);
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .footer {
            margin-top: 15px;
            font-size: 10px;
            text-align: center;
            color: #6B7280;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">İ</div>
        <h2>İMZA ASİSTAN</h2>
    </div>

    <div class="status-card">
        <div class="status-label">Aktif Sayfa Analizi</div>
        <div id="pageStatus" class="status-value">Bekleniyor...</div>
    </div>

    <div class="status-card">
        <div id="analysisResult" style="display: none;">
            <div class="status-label">Yatırım Skoru</div>
            <div class="status-value" style="font-size: 24px;">%88</div>
        </div>
        <button id="analyzeBtn" class="btn">İmza Lens ile Analiz Et</button>
    </div>

    <div class="footer">
        İmza Gayrimenkul © 2026 | v1.0.0
    </div>

    <script src="popup.js"></script>
</body>
</html>
