<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İmza GYO | Dijital Ekspertiz & Denetim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #a78bfa;
            --primary-dark: #8b5cf6;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .property-select {
            background: rgba(15, 23, 42, 0.8);
            color: white;
            border: 1px solid var(--primary);
            padding: 10px;
            border-radius: 8px;
            width: 300px;
        }

        .section-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .inspection-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 100px;
        }

        .category-title {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .check-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .item-label {
            flex: 1;
        }

        .score-options {
            display: flex;
            gap: 10px;
        }

        .score-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: 0.2s;
            background: #334155;
            color: white;
        }

        .score-1.active { background: #22c55e; border-color: white; } /* Yeşil */
        .score-2.active { background: #eab308; border-color: white; } /* Sarı */
        .score-3.active { background: #ef4444; border-color: white; } /* Kırmızı */
        .score-0.active { background: #64748b; border-color: white; } /* Gri */

        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .score-summary-bar {
            display: flex;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
            background: #334155;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 style="margin:0">Dijital Denetim</h1>
                <p style="color: #94a3b8; margin: 5px 0 0 0;">Gayrimenkul Kondisyon Raporu</p>
            </div>
            <select id="portfolioSelect" class="property-select" onchange="loadLastInspection()">
                <option value="">İlan Seçiniz...</option>
                <!-- JS ile doldurulacak -->
            </select>
        </div>

        <div class="section-tabs" id="categoryTabs">
            <!-- JS ile doldurulacak -->
        </div>

        <div class="inspection-card" id="inspectionContainer">
            <div id="activeCategoryContent">
                <p style="text-align:center; color: #94a3b8;">Lütfen yukarıdan bir kategori seçin veya bir ilan belirleyin.</p>
            </div>
        </div>
    </div>

    <div class="footer-nav">
        <div id="liveSummary" style="flex: 1; max-width: 400px;">
            <div style="display:flex; justify-content: space-between; margin-bottom: 5px;">
                <span>Toplam İlerleme</span>
                <span id="progressText">0%</span>
            </div>
            <div class="score-summary-bar">
                <div id="barGreen" style="width: 0%; background: #22c55e;"></div>
                <div id="barYellow" style="width: 0%; background: #eab308;"></div>
                <div id="barRed" style="width: 0%; background: #ef4444;"></div>
            </div>
        </div>
        <button class="btn-save" onclick="saveInspection()">
            <i class="fas fa-save"></i> Raporu Kaydet
        </button>
    </div>

    <script>
        const checklistCategories = [
            { id: 'hukuki', name: 'Hukuki & İdari', items: ['Tapu Tipi', 'İskan Durumu', 'Takyidat Durumu', 'Enerji Kimlik Belgesi', 'Aidat/Borç Durumu'] },
            { id: 'dis_mekan', name: 'Dış Mekan', items: ['Dış Cephe Boyası', 'Çatı Kaplaması', 'Çatı Olukları', 'Su Basmanı', 'Peyzaj/Sulama', 'Havuz Durumu'] },
            { id: 'ortak', name: 'Ortak Alanlar', items: ['Asansör', 'Merdiven Dairesi', 'Otopark', 'Hidrofor/Su Deposu'] },
            { id: 'ic_mekan', name: 'İç Mekan', items: ['Çelik Kapı', 'İç Kapılar', 'Pencereler', 'Zemin Kaplama', 'Duvarlar', 'Tavanlar'] },
            { id: 'mekanik', name: 'Mekanik & Elk', items: ['Sigorta Panosu', 'Prizler', 'Doğalgaz Hattı', 'Isıtma Sistemi', 'Klima', 'Su Basıncı'] },
            { id: 'mutfak', name: 'Mutfak', items: ['Dolaplar', 'Tezgah', 'Batarya/Eviye', 'Ankastre Ocak', 'Davlumbaz'] },
            { id: 'banyo', name: 'Banyo', items: ['Klozet/Rezervuar', 'Duşakabin', 'Lavabo/Batarya', 'Havalandırma', 'Zemin Eğimi'] }
        ];

        let inspectionData = {};
        let activeCategoryId = 'hukuki';

        function init() {
            const tabsContainer = document.getElementById('categoryTabs');
            checklistCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (cat.id === activeCategoryId ? ' active' : '');
                btn.innerText = cat.name;
                btn.onclick = () => switchCategory(cat.id);
                tabsContainer.appendChild(btn);
            });

            fetch('/api/portfolios')
                .then(r => r.json())
                .then(data => {
                    const select = document.getElementById('portfolioSelect');
                    data.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p.id;
                        opt.innerText = p.baslik;
                        select.appendChild(opt);
                    });
                });

            switchCategory('hukuki');
        }

        function switchCategory(id) {
            activeCategoryId = id;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === checklistCategories.find(c => c.id === id).name);
            });

            const cat = checklistCategories.find(c => c.id === id);
            const container = document.getElementById('activeCategoryContent');
            container.innerHTML = `<h2 class="category-title">${cat.name}</h2>`;

            cat.items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'check-item';
                row.innerHTML = `
                    <div class="item-label">${item}</div>
                    <div class="score-options">
                        <div class="score-btn score-1 ${getScore(id, item) === 1 ? 'active' : ''}" onclick="setScore('${id}', '${item}', 1)">1</div>
                        <div class="score-btn score-2 ${getScore(id, item) === 2 ? 'active' : ''}" onclick="setScore('${id}', '${item}', 2)">2</div>
                        <div class="score-btn score-3 ${getScore(id, item) === 3 ? 'active' : ''}" onclick="setScore('${id}', '${item}', 3)">3</div>
                        <div class="score-btn score-0 ${getScore(id, item) === 0 ? 'active' : ''}" onclick="setScore('${id}', '${item}', 0)">0</div>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function setScore(catId, item, score) {
            if (!inspectionData[catId]) inspectionData[catId] = {};
            inspectionData[catId][item] = score;
            switchCategory(catId); // Refresh UI
            updateSummary();
        }

        function getScore(catId, item) {
            return (inspectionData[catId] && inspectionData[catId][item] !== undefined) ? inspectionData[catId][item] : null;
        }

        function updateSummary() {
            let totalItems = 0;
            let filledItems = 0;
            let scores = {1:0, 2:0, 3:0, 0:0};

            checklistCategories.forEach(cat => {
                cat.items.forEach(item => {
                    totalItems++;
                    const score = getScore(cat.id, item);
                    if (score !== null) {
                        filledItems++;
                        scores[score]++;
                    }
                });
            });

            const progress = (filledItems / totalItems) * 100;
            document.getElementById('progressText').innerText = Math.round(progress) + '%';
            
            document.getElementById('barGreen').style.width = (scores[1] / totalItems * 100) + '%';
            document.getElementById('barYellow').style.width = (scores[2] / totalItems * 100) + '%';
            document.getElementById('barRed').style.width = (scores[3] / totalItems * 100) + '%';
        }

        function saveInspection() {
            const pId = document.getElementById('portfolioSelect').value;
            if (!pId) return alert('Lütfen bir taşınmaz seçin.');

            const payload = {
                portfolio_id: pId,
                staff_id: 'Saha-1', // Örnek
                category: 'Konut',
                checklist_data: inspectionData,
                score_summary: {
                    green: document.querySelectorAll('.score-1.active').length,
                    yellow: document.querySelectorAll('.score-2.active').length,
                    red: document.querySelectorAll('.score-3.active').length
                },
                overall_score: 85 // Hesaplama mantığı eklenebilir
            };

            fetch('/api/inspections', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(data => {
                alert(data.message);
            });
        }

        init();
    </script>
</body>
</html>
