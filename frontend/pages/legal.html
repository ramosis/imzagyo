<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hukuki Metinler | İmza Gayrimenkul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0A1128; --gold: #C5A059; }
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FA; color: var(--navy); }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .tab-active { border-left: 4px solid var(--gold); background: white; color: var(--gold); }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 glass-card border-b border-gray-100 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center">
            <div class="w-10 h-10 bg-navy rounded-xl flex items-center justify-center mr-3">
                <span class="text-gold font-bold text-xl">İ</span>
            </div>
            <h1 class="text-xl font-serif tracking-tighter">İmza <span class="text-gold">Gayrimenkul</span></h1>
        </div>
        <button onclick="window.history.back()" class="text-xs font-bold uppercase tracking-widest hover:text-gold transition-colors">
            <i class="fa-solid fa-arrow-left mr-2"></i> Geri Dön
        </button>
    </nav>

    <main class="pt-32 pb-24 px-6 max-w-7xl mx-auto">
        <div class="flex flex-col lg:flex-row gap-12">
            <!-- Sidebar -->
            <aside class="lg:w-1/4">
                <div class="sticky top-32 space-y-2">
                    <button onclick="showDoc('kvkk')" id="btn-kvkk" class="w-full text-left p-4 rounded-xl text-sm font-semibold transition-all hover:bg-white tab-active">
                        KVKK Aydınlatma Metni
                    </button>
                    <button onclick="showDoc('gizlilik')" id="btn-gizlilik" class="w-full text-left p-4 rounded-xl text-sm font-semibold transition-all hover:bg-white text-gray-500">
                        Gizlilik Politikası
                    </button>
                    <button onclick="showDoc('kosullar')" id="btn-kosullar" class="w-full text-left p-4 rounded-xl text-sm font-semibold transition-all hover:bg-white text-gray-500">
                        Kullanım Koşulları
                    </button>
                </div>
            </aside>

            <!-- Content Area -->
            <section class="lg:w-3/4 glass-card p-12 rounded-[2.5rem] shadow-sm border border-gray-100 min-h-[600px]">
                <div id="doc-content" class="prose prose-navy max-w-none">
                    <!-- Dynamic Content -->
                </div>
            </section>
        </div>
    </main>

    <script>
        const docs = {
            kvkk: `
                <h2 class="text-3xl font-serif mb-8">KVKK Aydınlatma Metni</h2>
                <p class="text-gray-600 mb-6 italic">Son Güncelleme: 19 Mart 2026</p>
                <div class="space-y-6 text-gray-700 leading-relaxed">
                    <p>6698 sayılı Kişisel Verilerin Korunması Kanunu ("KVKK") uyarınca, veri sorumlusu sıfatıyla İmza Gayrimenkul tarafından kişisel verilerinizin işlenme amaçları aşağıda açıklanmıştır.</p>
                    <h4 class="font-bold text-navy mt-8">1. Veri İşleme Dayanağı</h4>
                    <p>Kişisel verileriniz, Kanun’un 5. maddesinde belirtilen "bir sözleşmenin kurulması veya ifasıyla doğrudan doğruya ilgili olması" ve "ilgili kişinin temel hak ve özgürlüklerine zarar vermemek kaydıyla veri sorumlusunun meşru menfaatleri" hukuki sebeplerine dayalı olarak işlenmektedir.</p>
                    <h4 class="font-bold text-navy mt-8">2. İşlenen Veri Kategorileri</h4>
                    <ul class="list-disc pl-5 space-y-2">
                        <li>Kimlik ve İletişim Bilgileri (Formlar aracılığıyla)</li>
                        <li>Dijital İz Verileri (Kendi sitemizdeki L-metrikler)</li>
                        <li>Mülkiyet Bilgileri (Mülk yönetimi modülü kapsamında)</li>
                    </ul>
                    <h4 class="font-bold text-navy mt-8">3. Haklarınız</h4>
                    <p>KVKK'nın 11. maddesi uyarınca verilerinizin silinmesini, düzeltilmesini veya işlenip işlenmediğini öğrenme hakkına sahipsiniz.</p>
                    <p class="mt-8 font-semibold text-gold">İletişim: kvkk@imzaemlak.com</p>
                </div>
            `,
            gizlilik: `
                <h2 class="text-3xl font-serif mb-8">Gizlilik Politikası</h2>
                <p class="text-gray-600 mb-6 italic">Son Güncelleme: 19 Mart 2026</p>
                <div class="space-y-6 text-gray-700 leading-relaxed">
                    <p>İmza Gayrimenkul olarak gizliliğinize önem veriyoruz.</p>
                    <h4 class="font-bold text-navy mt-8">1. Toplanan Veriler</h4>
                    <p><strong>Kendi Sitemiz (First-Party):</strong> imzaemlak.com ve imzamahalle.com üzerinde kullanıcı deneyimini artırmak için scroll, odaklanma ve tıklama analitiği (L-Metrics) toplanmaktadır.</p>
                    <p><strong>Eklenti (Browser Extension):</strong> Eklenti, üçüncü parti sitelerde davranış takibi yapmaz. Sadece kullanıcının manuel olarak dashboard'a eklediği ilan verilerini işler ve bunları anonim istatistikler hariç yerel cihazda saklar.</p>
                    <h4 class="font-bold text-navy mt-8">2. Veri İşleme Amacı</h4>
                    <p>Veriler, size daha uygun gayrimenkul önerileri sunmak ve CRM sistemimizdeki "Niyet Skoru"nu hesaplamak amacıyla kullanılır.</p>
                    <h4 class="font-bold text-navy mt-8">3. Üçüncü Taraflar</h4>
                    <p>Verileriniz, yasal zorunluluklar hariç, üçüncü taraflarla reklam veya satış amaçlı paylaşılmaz.</p>
                </div>
            `,
            kosullar: `
                <h2 class="text-3xl font-serif mb-8">Kullanım Koşulları</h2>
                <p class="text-gray-600 mb-6 italic">Son Güncelleme: 19 Mart 2026</p>
                <div class="space-y-6 text-gray-700 leading-relaxed">
                    <p>Bu Kullanım Koşulları, İmza Gayrimenkul ("Şirket") tarafından sunulan web siteleri, mobil uygulamalar ve tarayıcı eklentileri (topluca "Platform") için geçerlidir.</p>
                    <h4 class="font-bold text-navy mt-8">1. Kabule Dair</h4>
                    <p>Platformu kullanarak, bu koşullara bağlı kalmayı kabul etmiş sayılırsınız.</p>
                    <h4 class="font-bold text-navy mt-8">2. Hizmet Kapsamı</h4>
                    <p>Platform, gayrimenkul portföy yönetimi, mahalle odaklı servisler ve mülk karşılaştırma araçları sunar. Bazı özellikler (Eklenti) sadece yerel kullanım amaçlıdır.</p>
                    <h4 class="font-bold text-navy mt-8">3. Tarayıcı Eklentisi Kullanımı</h4>
                    <ul class="list-disc pl-5 space-y-2">
                        <li>Eklenti, kullanıcının kendi rızasıyla tıkladığı ilan verilerini anonimleştirerek yerel bir dashboard üzerinde karşılaştırmasını sağlar.</li>
                        <li>Eklenti, üçüncü şahıslara ait hassas verileri otomatik olarak merkezi bir sunucuya kopyalamaz; veriler yerel (local_storage) üzerinde saklanır.</li>
                    </ul>
                    <h4 class="font-bold text-navy mt-8">4. Fikri Mülkiyet</h4>
                    <p>Platform üzerindeki tüm logolar, tasarımlar ve kodlar İmza Gayrimenkul'e aittir.</p>
                </div>
            `
        };

        function showDoc(id) {
            document.getElementById('doc-content').innerHTML = docs[id];
            
            // UI Update
            ['kvkk', 'gizlilik', 'kosullar'].forEach(key => {
                const btn = document.getElementById(`btn-${key}`);
                if (key === id) {
                    btn.classList.add('tab-active');
                    btn.classList.remove('text-gray-500');
                } else {
                    btn.classList.remove('tab-active');
                    btn.classList.add('text-gray-500');
                }
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Init
        showDoc('kvkk');
    </script>
</body>
</html>
