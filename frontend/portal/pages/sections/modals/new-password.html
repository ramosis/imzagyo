<div id="new-password-modal" class="fixed inset-0 z-[100] hidden bg-navy/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl p-8 relative slide-up-anim">
        <h3 class="text-2xl font-serif font-bold text-navy mb-4 text-center">Yeni Şifre Belirle</h3>
        <p class="text-sm text-gray-500 mb-6 text-center">Lütfen hesabınız için yeni ve güvenli bir şifre seçiniz.</p>
        
        <div class="space-y-4">
            <input type="hidden" id="reset-token">
            <div>
                <label class="block text-xs font-bold text-navy uppercase tracking-wider mb-2">Yeni Şifre</label>
                <input type="password" id="new-password" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gold/50 focus:border-gold outline-none" placeholder="••••••••">
            </div>
            <div>
                <label class="block text-xs font-bold text-navy uppercase tracking-wider mb-2">Şifre Tekrar</label>
                <input type="password" id="new-password-confirm" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gold/50 focus:border-gold outline-none" placeholder="••••••••">
            </div>
            <button onclick="submitNewPassword()" class="w-full bg-navy text-gold font-bold py-4 rounded-lg uppercase tracking-widest text-xs shadow-lg shadow-navy/20">
                Şifreyi Güncelle
            </button>
        </div>
    </div>
</div>
