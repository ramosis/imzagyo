<div id="expense-modal" class="fixed inset-0 bg-black/50 z-[2000] hidden flex items-center justify-center">
    <div class="bg-white rounded-xl p-8 w-full max-w-md">
        <h3 class="text-xl font-bold text-navy mb-4">Harcama Ekle</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">Tarih</label>
                <input type="date" id="exp-date" class="w-full border p-2 rounded">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">Kategori</label>
                <select id="exp-category" class="w-full border p-2 rounded">
                    <option value="yemek">Yemek</option>
                    <option value="yakıt">Yakıt / Ulaşım</option>
                    <option value="temsil">Temsil & Ağırlama</option>
                    <option value="ofis">Ofis Gideri</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">Tutar (TL)</label>
                <input type="number" id="exp-amount" placeholder="0.00" class="w-full border p-2 rounded">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">Açıklama</label>
                <input type="text" id="exp-desc" placeholder="Harcama detayı..." class="w-full border p-2 rounded">
            </div>
        </div>
        <div class="mt-6 flex justify-end gap-2">
            <button onclick="closeExpenseModal()" class="px-4 py-2 text-gray-500">İptal</button>
            <button onclick="saveExpense()" class="px-4 py-2 bg-navy text-white rounded">Kaydet</button>
        </div>
    </div>
</div>
