<div id="template-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-[2rem] w-full max-w-lg p-8 shadow-2xl relative">
        <button onclick="document.getElementById('template-modal').classList.add('hidden')" class="absolute top-6 right-6 text-gray-400 hover:text-navy"><i class="fa-solid fa-xmark text-xl"></i></button>
        <h3 class="text-2xl font-serif font-bold text-navy mb-6"><i class="fa-solid fa-file-code text-gold mr-2"></i> Mesaj Şablonu Oluştur</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">Şablon Adı</label>
                <input type="text" id="temp-name" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:border-gold" placeholder="Hoş Geldiniz Email">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">Tip</label>
                <select id="temp-type" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:border-gold">
                    <option value="email">E-Posta</option>
                    <option value="sms">SMS / WhatsApp</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">İçerik (HTML veya Düz Metin)</label>
                <textarea id="temp-content" rows="8" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:border-gold resize-none font-mono text-xs"></textarea>
                <p class="text-[9px] text-gray-400 mt-1">İpucu: {{name}}, {{property_title}} gibi değişkenleri kullanabilirsiniz.</p>
            </div>
            <button onclick="saveTemplate()" class="w-full bg-navy text-gold py-4 rounded-xl font-bold uppercase text-xs shadow-lg shadow-navy/20">Şablonu Kaydet</button>
        </div>
    </div>
</div>
