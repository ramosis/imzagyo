<div id="reset-modal" class="fixed inset-0 z-[2000] hidden bg-navy/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl p-8 relative slide-up-anim">
        <button onclick="closeResetModal()" class="absolute top-6 right-6 text-gray-400 hover:text-navy transition-colors">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
        
        <div id="reset-request-step">
            <h3 class="text-2xl font-serif font-bold text-navy mb-4 text-center">Şifremi Unuttum</h3>
            <p class="text-sm text-gray-500 mb-6 text-center">Hesabınıza bağlı e-posta adresinizi girin, size bir sıfırlama bağlantısı gönderelim.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-navy uppercase tracking-wider mb-2">E-Posta Adresi</label>
                    <input type="email" id="reset-email" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gold/50 focus:border-gold outline-none" placeholder="ornek@imzaemlak.com">
                </div>
                <button onclick="requestPasswordReset()" id="reset-req-btn" class="w-full bg-navy text-gold font-bold py-4 rounded-lg uppercase tracking-widest text-xs shadow-lg shadow-navy/20">
                    Bağlantı Gönder
                </button>
            </div>
        </div>

        <div id="reset-success-step" class="hidden text-center py-4">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-solid fa-paper-plane"></i>
            </div>
            <h3 class="text-xl font-bold text-navy mb-2">E-Posta Gönderildi!</h3>
            <p class="text-sm text-gray-500 mb-6">Lütfen gelen kutunuzu (ve gereksiz kutusunu) kontrol edin.</p>
            <button onclick="closeResetModal()" class="w-full bg-gray-100 text-navy font-bold py-3 rounded-lg text-xs uppercase">Kapat</button>
        </div>
    </div>
</div>
