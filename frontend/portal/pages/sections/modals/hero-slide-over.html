<div id="hero-modal-backdrop" class="fixed inset-0 bg-navy/60 backdrop-blur-sm z-40 hidden transition-opacity duration-300 opacity-0" onclick="closeHeroModal()"></div>

<div id="hero-slide-over" class="fixed top-0 right-0 min-h-screen w-full max-w-md bg-white/95 backdrop-blur-xl shadow-2xl z-50 transform translate-x-full transition-transform duration-500 cubic-bezier(0.16, 1, 0.3, 1) border-l border-white/20 flex flex-col">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-gold via-navy to-gold"></div>
    <div class="flex items-center justify-between p-6 border-b border-gray-100 shrink-0">
        <div>
            <h2 id="hero-modal-title" class="text-xl font-serif font-bold text-navy">Yeni Slide Ekle</h2>
            <p class="text-xs text-gray-500 mt-1">Anasayfa vitrinini özelleştirin.</p>
        </div>
        <button onclick="closeHeroModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 text-gray-400 hover:text-navy hover:bg-gray-100 transition-colors">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <div class="flex-1 overflow-y-auto p-6 space-y-6">
        <input type="hidden" id="hero-id">
        <div>
            <label class="block text-[10px] font-bold text-navy uppercase tracking-wider mb-2">Arkaplan Görsel (URL)</label>
            <input type="text" id="hero-img" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold/30 focus:border-gold focus:bg-white transition-all text-sm font-medium text-navy" placeholder="https://...">
            <div id="hero-img-preview" class="mt-3 w-full h-32 rounded-lg bg-gray-100 border border-gray-200 bg-cover bg-center hidden"></div>
        </div>
        <div>
            <label class="block text-[10px] font-bold text-navy uppercase tracking-wider mb-2">Gösterim Sırası</label>
            <input type="number" id="hero-sira" class="w-24 px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold/30 focus:border-gold transition-all text-sm font-medium" value="0">
        </div>
        <div class="border-t border-gray-100 pt-5">
            <p class="text-xs font-bold text-gold uppercase tracking-widest mb-4"><i class="fa-solid fa-heading mr-2"></i> Başlık Alanları</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-navy uppercase tracking-wider mb-2">İtalik Alt Başlık (Gold)</label>
                    <input type="text" id="hero-alt" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold/30 focus:border-gold transition-all text-sm font-medium" placeholder="Örn: Premium Yatırım Çözümleri">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-navy uppercase tracking-wider mb-2">Ana Başlık (Satır 1)</label>
                    <input type="text" id="hero-title1" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold/30 focus:border-gold transition-all text-sm font-medium" placeholder="Örn: Sadece Bir Ev Değil,">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-navy uppercase tracking-wider mb-2">Ana Başlık (Satır 2 - Vurgulu)</label>
                    <input type="text" id="hero-title2" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold/30 focus:border-gold transition-all text-sm font-medium" placeholder="Örn: Yeni Bir Hayat.">
                </div>
            </div>
        </div>
        <div class="border-t border-gray-100 pt-5">
            <p class="text-xs font-bold text-gold uppercase tracking-widest mb-4"><i class="fa-solid fa-link mr-2"></i> Yönlendirme (Call to Action)</p>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-navy uppercase tracking-wider mb-2">Birinci Buton</label>
                        <input type="text" id="hero-btn1" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none text-sm font-medium" value="Detaylı Arama Yap" disabled>
                        <p class="text-[9px] text-gray-400 mt-1">Sabit (Arama Modalı)</p>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-navy uppercase tracking-wider mb-2">İkinci Buton Metni</label>
                        <input type="text" id="hero-btn2" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold/30 focus:border-gold transition-all text-sm font-medium" placeholder="Örn: Koleksiyonları Keşfet">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-navy uppercase tracking-wider mb-2">İkinci Buton Linki (Hedef Sayfa)</label>
                    <input type="text" id="hero-target" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold/30 focus:border-gold transition-all text-sm font-medium" placeholder="Örn: koleksiyon.html?tip=prestij">
                </div>
            </div>
        </div>
    </div>

    <div class="p-6 border-t border-gray-100 bg-gray-50/50 shrink-0">
        <button onclick="saveHeroSlide()" class="w-full bg-navy hover:bg-slate-800 text-gold font-bold py-4 rounded-lg transition-all gold-glow uppercase tracking-[0.15em] text-xs flex items-center justify-center gap-2">
            <i class="fa-solid fa-check"></i> Kaydet ve Yayınla
        </button>
    </div>
</div>
