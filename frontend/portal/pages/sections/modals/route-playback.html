<div id="route-playback-modal" class="fixed inset-0 bg-navy/80 backdrop-blur-sm z-[2000] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-[2.5rem] w-full max-w-5xl h-[85vh] flex flex-col overflow-hidden shadow-2xl animate-scale-up">
        <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-xl shadow-inner">
                    <i class="fa-solid fa-route"></i>
                </div>
                <div>
                    <h3 class="text-xl font-serif font-bold text-navy" id="playback-staff-name">Saha Personeli Takibi</h3>
                    <p class="text-xs text-gray-400 font-medium uppercase tracking-widest">Rota Geçmişi ve Playback</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <input type="date" id="playback-date" onchange="loadRouteHistory(currentPlaybackUserId, this.value)" 
                       class="bg-gray-50 border border-gray-100 rounded-xl px-4 py-2 text-sm font-bold text-navy focus:ring-2 focus:ring-gold/20 outline-none transition-all">
                <button onclick="closeRoutePlayback()" class="w-10 h-10 rounded-full hover:bg-gray-50 text-gray-400 transition-colors flex items-center justify-center">
                    <i class="fa-solid fa-times text-lg"></i>
                </button>
            </div>
        </div>
        
        <div class="flex-1 relative">
            <div id="playback-map-container" class="absolute inset-0"></div>
            
            <!-- Playback Controls Overlay -->
            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 w-full max-w-2xl px-6 z-[2001]">
                <div class="bg-white/90 backdrop-blur-md rounded-2xl border border-gray-100 shadow-2xl p-4 flex items-center gap-6">
                    <button onclick="togglePlayback()" class="w-12 h-12 rounded-full bg-navy text-white flex items-center justify-center hover:bg-slate-800 transition-all shadow-lg active:scale-95">
                        <i id="play-icon" class="fa-solid fa-play"></i>
                    </button>
                    
                    <div class="flex-1 space-y-2">
                        <div class="flex justify-between text-[10px] font-black text-navy uppercase tracking-tighter">
                            <span id="playback-time">00:00:00</span>
                            <span id="playback-status">Duraklatıldı</span>
                        </div>
                        <input type="range" id="playback-slider" min="0" max="100" value="0" oninput="handleSliderChange(this.value)"
                               class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-gold">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
