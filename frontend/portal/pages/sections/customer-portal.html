<div class="customer-portal-container fade-in">
    <div class="portal-header">
        <div class="welcome-text">
            <h1 id="customer-name">Hoş Geldiniz</h1>
            <p>Gayrimenkul işlem sürecinizi buradan takip edebilirsiniz.</p>
        </div>
        <div class="active-agent">
            <img src="/static/img/avatars/agent-default.jpg" alt="Danışman" id="agent-photo">
            <div class="agent-info">
                <span class="label">Sorumlu Danışman</span>
                <span class="name" id="agent-name">Yükleniyor...</span>
            </div>
        </div>
    </div>

    <!-- İşlem Özeti (Kartlar) -->
    <div class="portal-stats">
        <div class="stat-card">
            <div class="icon"><i class="fas fa-home"></i></div>
            <div class="data">
                <span class="value" id="property-title">-</span>
                <span class="label">İşlemdeki Mülk</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="icon"><i class="fas fa-tasks"></i></div>
            <div class="data">
                <span class="value" id="process-status">Hazırlanıyor</span>
                <span class="label">Güncel Durum</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="icon"><i class="fas fa-clock"></i></div>
            <div class="data">
                <span class="value" id="last-update">-</span>
                <span class="label">Son Güncelleme</span>
            </div>
        </div>
    </div>

    <div class="portal-main-grid">
        <!-- Zaman Çizelgesi (Timeline) -->
        <div class="timeline-section luxury-card">
            <div class="card-header">
                <h2><i class="fas fa-stream"></i> İşlem Süreci (Timeline)</h2>
                <span class="badge" id="completion-rate">0% Tamamlandı</span>
            </div>
            <div class="timeline-container" id="transaction-timeline">
                <div class="loading-spinner">Yükleniyor...</div>
                <!-- Timeline öğeleri dinamik olarak gelecek -->
            </div>
        </div>

        <!-- Dökümanlar & Dosyalar -->
        <div class="documents-section luxury-card">
            <div class="card-header">
                <h2><i class="fas fa-folder-open"></i> Dökümanlar</h2>
            </div>
            <ul class="document-list" id="document-list">
                <!-- Dökümanlar dinamik olarak gelecek -->
            </ul>
            
            <div class="agent-contact-box">
                <p>Bir sorunuz mu var?</p>
                <button class="btn-contact-agent" onclick="app.modules.customer_portal.contactAgent()">
                    <i class="fab fa-whatsapp"></i> Danışmana Yazın
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    .customer-portal-container { padding: 30px; color: #fff; }
    .portal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .portal-header h1 { font-size: 2.5rem; margin: 0; font-weight: 300; background: linear-gradient(135deg, #fff 0%, #a78bfa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .active-agent { display: flex; align-items: center; background: rgba(167, 139, 250, 0.1); padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(167, 139, 250, 0.2); }
    .active-agent img { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; border: 2px solid #a78bfa; }
    .agent-info .label { display: block; font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; }
    .agent-info .name { font-weight: 600; color: #a78bfa; }

    .portal-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 20px; display: flex; align-items: center; transition: transform 0.3s ease; }
    .stat-card:hover { transform: translateY(-5px); border-color: #a78bfa; }
    .stat-card .icon { font-size: 2rem; margin-right: 20px; color: #a78bfa; opacity: 0.8; }
    .stat-card .value { display: block; font-size: 1.2rem; font-weight: 600; margin-bottom: 5px; }
    .stat-card .label { font-size: 0.85rem; opacity: 0.5; }

    .portal-main-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 30px; }
    .luxury-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 30px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .card-header h2 { font-size: 1.4rem; font-weight: 500; margin: 0; display: flex; align-items: center; gap: 12px; }
    .card-header .badge { background: rgba(74, 222, 128, 0.1); color: #4ade80; padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid rgba(74, 222, 128, 0.2); }

    /* Timeline Styles */
    .timeline-container { position: relative; padding-left: 50px; }
    .timeline-container::before { content: ''; position: absolute; left: 24px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, #a78bfa 0%, rgba(167, 139, 250, 0.1) 100%); }
    
    .timeline-item { position: relative; margin-bottom: 40px; }

    .timeline-icon i { font-size: 1.2rem; z-index: 2; color: #a78bfa; background: #1e1b4b; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #a78bfa; }
    
    .timeline-content { background: rgba(255, 255, 255, 0.02); padding: 20px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05); }
    .timeline-content .date { font-size: 0.8rem; color: #a78bfa; margin-bottom: 8px; display: block; }
    .timeline-content h3 { margin: 0 0 10px 0; font-size: 1.1rem; }
    .timeline-content p { margin: 0; font-size: 0.9rem; opacity: 0.7; line-height: 1.6; }

    /* Document List */
    .document-list { list-style: none; padding: 0; margin: 0; }
    .document-item { display: flex; align-items: center; padding: 15px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; margin-bottom: 12px; transition: all 0.2s; cursor: pointer; }
    .document-item:hover { background: rgba(167, 139, 250, 0.1); border-color: #a78bfa; }
    .document-item .file-icon { font-size: 1.5rem; margin-right: 15px; color: #a78bfa; }
    .document-item .file-info { flex-grow: 1; }
    .document-item .file-name { display: block; font-weight: 500; font-size: 0.95rem; }
    .document-item .file-meta { font-size: 0.75rem; opacity: 0.5; }
    .document-item .download-btn { font-size: 1.2rem; opacity: 0.6; transition: opacity 0.2s; }
    .document-item:hover .download-btn { opacity: 1; color: #4ade80; }

    .agent-contact-box { margin-top: 40px; padding: 25px; background: linear-gradient(135deg, rgba(167, 139, 250, 0.1) 0%, rgba(30, 27, 75, 0.4) 100%); border-radius: 20px; text-align: center; border: 1px solid rgba(167, 139, 250, 0.2); }
    .btn-contact-agent { background: #4ade80; color: #000; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: all 0.3s; }
    .btn-contact-agent:hover { background: #22c55e; transform: scale(1.02); }

    @media (max-width: 1024px) {
        .portal-main-grid { grid-template-columns: 1fr; }
        .portal-stats { grid-template-columns: 1fr; }
        .portal-header { flex-direction: column; align-items: flex-start; gap: 20px; }
    }
</style>
