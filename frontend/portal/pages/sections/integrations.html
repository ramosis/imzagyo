<section id="integrations-section"

                </h2>
                <p class="text-sm text-gray-500">İlan siteleri, sosyal medya ve tasarım
                    araçlarına tek
                    noktadan paylaşım.</p>
            </div>
            <button onclick="openPublishWizard()"

        </div>

            </h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4"

        <div class="mb-8">

        <div class="mb-8">

                    <table class="w-full text-left">

                                <th class="px-6 py-3">Tarih</th>
                                <th class="px-6 py-3">Durum</th>

                    </table>
