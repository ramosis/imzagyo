<div id="projects-section" class="content-section hidden">
    <div class="flex justify-between items-center mb-6">
        <p class="text-gray-500 text-sm">Özel proje tanıtım sayfalarını (Landing Page) yönetin.</p>
        <button onclick="openProjectModal()" 
            class="bg-navy hover:bg-slate-800 text-gold px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-md flex items-center gap-2 uppercase tracking-wider text-[10px]">
            <i class="fa-solid fa-plus"></i> Yeni Proje Oluştur
        </button>
    </div>
    
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <table class="w-full text-left premium-table">
            <thead>
                <tr>
                    <th class="py-4 px-6 border-b border-gray-200">Proje Adı</th>
                    <th class="py-4 px-6 border-b border-gray-200">Slug / Link</th>
                    <th class="py-4 px-6 border-b border-gray-200">Konum</th>
                    <th class="py-4 px-6 border-b border-gray-200 text-center">Durum</th>
                    <th class="py-4 px-6 border-b border-gray-200 text-right">İşlemler</th>
                </tr>
            </thead>
            <tbody id="projects-table-body" class="text-sm">
                <tr><td colspan="5" class="py-8 text-center text-gray-400 text-xs italic">Projeler yükleniyor...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Project Leads Modal -->
    <div id="project-leads-modal" class="fixed inset-0 bg-navy/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl w-full max-w-4xl max-h-[80vh] flex flex-col">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-navy" id="p-leads-title">Proje Talepleri</h3>
                <button onclick="document.getElementById('project-leads-modal').classList.add('hidden')" class="text-gray-400 hover:text-navy"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 overflow-y-auto">
                <table class="w-full text-left premium-table">
                    <thead>
                        <tr>
                            <th class="py-2 px-4">Tarih</th>
                            <th class="py-2 px-4">Ad Soyad</th>
                            <th class="py-2 px-4">İletişim</th>
                            <th class="py-2 px-4">Mesaj</th>
                        </tr>
                    </thead>
                    <tbody id="p-leads-body" class="text-xs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Project Save Modal -->
    <div id="project-save-modal" class="fixed inset-0 bg-navy/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl w-full max-w-lg">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center text-navy font-bold">
                <h3>Yeni Proje Landing Page</h3>
                <button onclick="document.getElementById('project-save-modal').classList.add('hidden')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="text" id="p-name" placeholder="Proje Adı (Örn: Vadi Evleri)" class="w-full px-4 py-2 border rounded-lg text-sm outline-none focus:border-gold">
                <input type="text" id="p-slug" placeholder="URL Slug (Örn: vadi-evleri)" class="w-full px-4 py-2 border rounded-lg text-sm outline-none focus:border-gold">
                <input type="text" id="p-location" placeholder="Lokasyon (Örn: Sarıyer, İstanbul)" class="w-full px-4 py-2 border rounded-lg text-sm outline-none focus:border-gold">
                <input type="text" id="p-image" placeholder="Hero Görsel URL" class="w-full px-4 py-2 border rounded-lg text-sm outline-none focus:border-gold">
                <textarea id="p-desc" placeholder="Proje Açıklaması" rows="3" class="w-full px-4 py-2 border rounded-lg text-sm outline-none focus:border-gold"></textarea>
                <button onclick="saveProject()" class="w-full bg-gold text-white py-3 rounded-lg font-bold hover:bg-yellow-600 transition-colors">PROJEYİ KAYDET</button>
            </div>
        </div>
    </div>
</div>
