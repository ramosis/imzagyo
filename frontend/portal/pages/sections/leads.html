<section id="leads-section" class="content-section flex flex-col h-full bg-white">
    <div class="px-8 py-6 border-b border-gray-100 shrink-0">
        <div class="flex justify-between items-end">
            <div class="space-y-1">
                <h2 class="text-2xl font-serif font-bold text-navy">Müşteri Adayları (CRM)</h2>
                <p class="text-sm text-gray-500">Potansiyel alıcıları ve satış hunisini yönetin.</p>
            </div>
            <div class="flex items-center gap-3">
                <!-- Görünüm Seçici -->
                <div class="flex bg-gray-100 p-1 rounded-xl border border-gray-200">
                    <button onclick="switchLeadsView('list')" id="leads-list-btn"
                        class="px-4 py-2 rounded-lg text-xs font-bold transition-all bg-white text-navy shadow-sm">
                        <i class="fa-solid fa-table-list mr-1"></i> Tablo
                    </button>
                    <button onclick="switchLeadsView('pipeline')" id="leads-pipeline-btn"
                        class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-gray-500 hover:text-navy">
                        <i class="fa-solid fa-diagram-project mr-1"></i> Pipeline
                    </button>
                </div>
                <button onclick="openLeadModal()"
                    class="bg-navy hover:bg-slate-800 text-white font-bold py-3 px-6 rounded-lg transition-all text-xs uppercase tracking-widest">
                    <i class="fa-solid fa-plus text-gold mr-2"></i> Yeni Aday
                </button>
            </div>
        </div>
    </div>
    <div class="flex-1 overflow-auto p-8">
        <!-- Liste Görünümü -->
        <div id="leads-list-view"
            class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left premium-table">
                    <thead>
                        <tr>
                            <th class="px-6 py-4">Müşteri</th>
                            <th class="px-6 py-4">İletişim</th>
                            <th class="px-6 py-4">Kaynak</th>
                            <th class="px-6 py-4">İlgi Alanı / Not</th>
                            <th class="px-6 py-4">Tarih</th>
                            <th class="px-6 py-4 text-right">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="leads-table-body" class="text-sm"></tbody>
                </table>
            </div>
        </div>

        <!-- Pipeline / Kanban Görünümü -->
        <div id="leads-pipeline-view" class="hidden">
            <div id="pipeline-container" class="kanban-container">
                <!-- Stage'ler dinamik olarak buraya gelecek -->
                <div class="flex items-center justify-center w-full py-20 text-gray-400">
                    <i class="fa-solid fa-spinner fa-spin mr-2"></i> Pipeline yükleniyor...
                </div>
            </div>
        </div>
    </div>
</section>
