<div id="system-settings-section" class="content-section hidden animate-fade-in pb-20">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
        <div>
            <h2 class="text-2xl font-black text-navy tracking-tight mb-1 uppercase font-serif"><i class="fa-solid fa-gears text-gold mr-2"></i> Sistem Ayarları</h2>
            <p class="text-gray-500 text-xs font-medium">Sistem modunu (Canlı, Taslak, Demo) yönetin.</p>
        </div>
    </div>

    <div class="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm w-full max-w-3xl mx-auto">
        <label class="block text-sm font-bold text-navy uppercase mb-4 text-center tracking-widest">SİTE GÖSTERİM MODU</label>
        <p class="text-center text-gray-500 text-xs mb-8">Bu ayar, kullanıcılarn göreceği portföyleri ve anasayfa tasarımını etkiler.</p>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6" id="site-mode-cards">
            <!-- DEMO -->
            <label class="relative cursor-pointer group">
                <input type="radio" name="site_mode" value="demo" class="peer sr-only">
                <div class="p-6 border-2 border-gray-100 rounded-3xl hover:bg-gray-50 transition-all peer-checked:border-gold peer-checked:bg-gold/5 flex flex-col h-full text-center">
                    <div class="w-14 h-14 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform peer-checked:bg-gold/20">
                        <i class="fa-solid fa-code text-2xl text-gray-400 peer-checked:text-gold"></i>
                    </div>
                    <h4 class="font-bold text-navy text-sm uppercase mb-2">Demo Mod</h4>
                    <p class="text-[10px] text-gray-500 font-medium">Örnek (örnek veriler: 1) ilanlar da dahil tüm özellikleri içeren geliştirme ve sunum ortamı.</p>
                </div>
            </label>

            <!-- PLACEHOLDER -->
            <label class="relative cursor-pointer group">
                <input type="radio" name="site_mode" value="placeholder" class="peer sr-only">
                <div class="p-6 border-2 border-gray-100 rounded-3xl hover:bg-gray-50 transition-all peer-checked:border-gold peer-checked:bg-gold/5 flex flex-col h-full text-center">
                    <div class="w-14 h-14 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform peer-checked:bg-gold/20">
                        <i class="fa-regular fa-hourglass-half text-2xl text-gray-400 peer-checked:text-gold"></i>
                    </div>
                    <h4 class="font-bold text-navy text-sm uppercase mb-2">Placeholder</h4>
                    <p class="text-[10px] text-gray-500 font-medium">Bölgesel SEO (Yakında) için yer tutucu anasayfa ve dinamik haber ver (<span class="italic font-bold">Lead</span>) formu.</p>
                </div>
            </label>

            <!-- LIVE -->
            <label class="relative cursor-pointer group">
                <input type="radio" name="site_mode" value="live" class="peer sr-only">
                <div class="p-6 border-2 border-gray-100 rounded-3xl hover:bg-gray-50 transition-all peer-checked:border-emerald-500 peer-checked:bg-emerald-50 flex flex-col h-full text-center">
                    <div class="w-14 h-14 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform peer-checked:bg-emerald-200">
                        <i class="fa-solid fa-rocket text-2xl text-gray-400 peer-checked:text-emerald-600"></i>
                    </div>
                    <h4 class="font-bold text-navy text-sm uppercase mb-2">Canlı Yayın</h4>
                    <p class="text-[10px] text-gray-500 font-medium">Platform tam kapasitede. Sadece gerçek <span class="text-emerald-600 font-bold">(is_sample=0)</span> olan onaylı ilanlar müşterilere gösterilir.</p>
                </div>
            </label>
        </div>
        
        <div class="mt-10 flex justify-center">
            <button onclick="saveSiteSettings()" class="bg-navy hover:bg-slate-800 text-gold px-12 py-4 rounded-full font-bold uppercase transition-transform shadow-xl shadow-navy/20 flex items-center gap-3 text-sm active:scale-95">
                <i class="fa-solid fa-check"></i> Ayarları Uygula
            </button>
        </div>
    </div>
</div>
